<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>자동 성적 분석·학기말 의견 생성기</title>
<link rel="stylesheet" href="style.css">

<!-- pdf.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>

</head>
<body>

<div class="container">
    <h1>📘 자동 성적 분석 & 학기말 의견 생성기</h1>
    <p class="desc">PDF 성적표를 업로드하면 자동으로 데이터를 읽고, 학생별 사실 기반 + 발전 가능성을 담은 학기말 의견을 만들어드립니다.</p>

    <div class="card">
        <h2>1. PDF 성적표 업로드</h2>
        <input type="file" id="pdfInput" accept="application/pdf">
        <p class="small">반/번호 · 성명 · 영역 · 성취기준 · 평가요소 · 단계 · 평가결과가 포함된 나이스 성적표 PDF를 올려주세요.</p>
    </div>

    <div class="card">
        <h2>2. 이번 학기 활동 입력</h2>
        <textarea id="activities" placeholder="예: 독서 토론 활동, 프로젝트 글쓰기, 발표·토의 활동 등 학생들이 경험한 주요 활동을 입력하세요."></textarea>
    </div>

    <div class="card">
        <h2>3. 특별히 잘한 학생 메모(선택)</h2>
        <textarea id="specialNote" placeholder="예: 김민수: 발표 우수 / 정다현: 읽기 태도 우수"></textarea>
    </div>

    <button id="generateBtn">학기말 의견 생성하기</button>

    <div id="output"></div>
</div>

<script src="script.js"></script>

</body>
</html>
