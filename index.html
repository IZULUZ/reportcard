<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>성적 자동 분석기</title>
  <link rel="stylesheet" href="style.css" />

  <!-- PDF.js : PDF 텍스트 추출 라이브러리 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>

  <!-- JSZip : HWPX(ZIP 구조) 파일 생성 라이브러리 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

</head>
<body>

<div class="container">

  <!-- 상단 타이틀 -->
  <div class="header">
    <h1>📋 성적 자동 분석기</h1>
    <p>나이스 성적 PDF를 업로드하면 학생별 성취기준·평가내용·등급을 자동으로 분석하여 한글 표 파일로 내려받을 수 있습니다.</p>
  </div>

  <!-- 1단계: 파일 업로드 -->
  <div class="card">
    <div class="card-title">📂 1단계 · 성적 PDF 파일 업로드</div>
    <div class="upload-area" id="uploadArea">
      <input type="file" id="pdfInput" accept="application/pdf" />
      <p>여기를 클릭하거나 PDF 파일을 끌어다 놓으세요</p>
      <span id="fileName" class="file-name"></span>
    </div>
  </div>

  <!-- 분석 버튼 -->
  <button id="analyzeBtn">📊 성적 분석 시작</button>

  <!-- 로딩 표시 -->
  <div id="loading" class="loading hidden">⏳ PDF를 분석하는 중입니다...</div>

  <!-- 2단계: 분석 결과 미리보기 -->
  <div id="resultSection" class="hidden">
    <div class="card">
      <div class="card-title">📊 2단계 · 분석 결과 미리보기</div>
      <div class="table-wrap">
        <table id="previewTable">
          <thead>
            <tr>
              <th>번호</th>
              <th>이름</th>
              <th>영역</th>
              <th>성취기준</th>
              <th>평가내용</th>
              <th>잘함</th>
              <th>보통</th>
              <th>노력요함</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- 한글 파일 내려받기 버튼 -->
    <button id="downloadBtn">📥 한글 파일(.hwpx)로 내려받기</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
